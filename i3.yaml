- name: Install i3 linux
  tags:
    - i3
  vars:
    packages:
      - xorg
      - xorg-xinit
      - dmenu
      - ttf-liberation
      - i3
  block:
    - name: Install packages for i3
      when: ansible_distribution == "Archlinux"
      with_items:
        - "{{ packages }}"
      become: yes
      become_user: root
      pacman:
        name: "{{ item }}"
        state: present
    - name: Ensure file exists
      file:
        path: ~/.xinitrc
        state: touch
    - name: Add line to file
      lineinfile:
        line: exec i3
        path: ~/.xinitrc
    - name: Ensure i3 dir exists
      file:
        path: ~/.config/i3
        state: directory
    - name: Stow i3 files
      shell: >
        stow -t ~/.config/i3/ -d dotfiles i3
