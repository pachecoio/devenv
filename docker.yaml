- name: Install docker
  tags:
    - docker
  vars:
    docker_group: docker
    remote_user: pacheco
  block:
    - name: Install docker on arch
      become: yes
      become_user: root
      with_items:
        - docker
        - docker-compose
      pacman:
        name: "{{ item }}"
        state: present

    - name: Start and enable docker service
      become: yes
      become_user: root
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Create "docker" group
      group:
        name: "{{ docker_group }}"
        state: present
    
    - name: Add  user to "docker" group
      become: yes
      become_user: root
      user:
        name: "{{ remote_user }}"
        group: "{{ docker_group }}"
        append: yes
