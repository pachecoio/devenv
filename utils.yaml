- name: Install JQ
  tags:
    - utils
    - jq
  vars:
    tools:
      - jq
      - curl
      - stow
      - fzf
      - ripgrep
      - zoxide
  block:
    - name: Install utilities on arch
      when: ansible_distribution == "Archlinux"
      become: yes
      become_user: root
      with_items:
        - "{{ tools }}"
      pacman:
        name: "{{ item }}"
        state: present

    - name: Install utilities on ubuntu
      when: ansible_distribution == "Ubuntu"
      become: yes
      become_user: root
      with_items:
        - "{{ tools }}"
      apt:
        name: "{{ item }}"
        state: present

    - name: Configure zoxide
      block:
        - name: Add zoxide to path zsh
          lineinfile:
            path: ~/.zshrc
            line: eval "$(zoxide init zsh --cmd cd)"



