- name: Install emacs
  tags:
    - emacs
  block:
    - name: Install emacs arch
      when: ansible_distribution == "Archlinux"
      become: yes
      become_user: root
      pacman:
        name: emacs
        state: present
    - name: Install doom emacs
      when: ansible_distribution == "Archlinux"
      block:
        - name: Clone doom repo
          git:
            repo: "https://github.com/doomemacs/doomemacs"
            dest: ~/.config/emacs
            depth: 1
        # - name: Execute install
        #   shell: |
        #     ~/.config/emacs/bin/doom install
        - name: Add doom emacs to path
          blockinfile:
            path: ~/.zshrc
            block: |
              export DOOM_DIR="$HOME/.config/emacs/bin"
              export PATH="$DOOM_DIR:$PATH"

        - name: Cleanup autogenerated doom files
          file:
            path: ~/.config/doom
            state: absent
        - name: Create doom dir
          file:
            path: ~/.config/doom
            state: directory
        - name: Stow doom emacs config files
          shell: |
            stow -t ~/.config/doom -d dotfiles doom

